<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Nova · AI Mentor</title>
<script src="topbar.js" defer></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #6EE7B7; --accent-2: #67E8F9;
  --bg: #05060c; --fg: #e9ecf5;
  --muted: rgba(233,236,245,.50); --line: rgba(255,255,255,.09);
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
}

/* ── Full-height shell ── */
html { height: 100%; }
body { height: 100%; overflow: hidden; background: var(--bg); color: var(--fg);
  font-family: var(--font); -webkit-text-size-adjust: 100%; }

.shell {
  height: 100%;
  display: flex; flex-direction: column;
}

/* ── Header ── */
.header {
  flex-shrink: 0;
  padding: 14px 24px 0;
  border-bottom: 1px solid var(--line);
}
.top { display: flex; align-items: center; gap: 13px; padding-bottom: 13px; }

/* small orb */
.orb { width: 42px; height: 42px; border-radius: 50%; position: relative; flex-shrink: 0;
  background: radial-gradient(circle at 32% 28%, #eafff6, var(--accent) 42%, #1f8f66 100%);
  box-shadow: 0 0 18px -3px var(--accent), inset 0 -5px 12px rgba(0,0,0,.25);
  animation: orbFloat 4s ease-in-out infinite; }
.orb::before, .orb::after { content: ''; position: absolute; top: 38%; width: 7px; height: 7px;
  border-radius: 50%; background: #06281d; transition: height .15s; }
.orb::before { left: 30%; } .orb::after { right: 30%; }
.orb.think { animation: orbFloat 1s ease-in-out infinite, orbPulse 1s ease-in-out infinite; }
.orb.happy::before, .orb.happy::after { height: 3px; border-radius: 0 0 7px 7px; }

/* hero orb (empty state) */
.orb-hero { width: 80px; height: 80px; border-radius: 50%; position: relative;
  background: radial-gradient(circle at 32% 28%, #eafff6, var(--accent) 42%, #1f8f66 100%);
  box-shadow: 0 0 40px -4px var(--accent), inset 0 -8px 20px rgba(0,0,0,.25);
  animation: orbFloat 4s ease-in-out infinite; }
.orb-hero::before, .orb-hero::after { content: ''; position: absolute; top: 38%; width: 12px; height: 12px;
  border-radius: 50%; background: #06281d; transition: height .15s; }
.orb-hero::before { left: 30%; } .orb-hero::after { right: 30%; }
.orb-hero.think { animation: orbFloat 1s ease-in-out infinite, orbPulse 1s ease-in-out infinite; }
.orb-hero.happy::before, .orb-hero.happy::after { height: 5px; border-radius: 0 0 12px 12px; }

@keyframes orbFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
@keyframes orbPulse { 0%,100%{box-shadow:0 0 18px -3px var(--accent)} 50%{box-shadow:0 0 36px 4px var(--accent)} }

.title h1 { font-family: 'Times New Roman', Georgia, serif; font-style: italic; font-size: 22px; font-weight: 500;
  background: linear-gradient(90deg, var(--accent-2), var(--accent));
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.title .role { font-family: ui-monospace, monospace; font-size: 9.5px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--muted); margin-top: 3px; }

.key-toggle { margin-left: auto; border: 1px solid var(--line); background: rgba(255,255,255,.03);
  border-radius: 10px; padding: 8px 10px; cursor: pointer; font-size: 16px; line-height: 1;
  opacity: .50; transition: opacity .15s; color: var(--fg); }
.key-toggle:hover { opacity: 1; }
.key-toggle.has-key { opacity: 1; border-color: var(--accent); }

/* ── Key panel ── */
.keypanel { display: none; padding-bottom: 13px; }
.keypanel.open { display: block; }
.keybar { display: flex; gap: 8px; margin-bottom: 9px; }
.keybar input { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--line);
  color: var(--fg); border-radius: 10px; padding: 10px 13px; font-size: 13px; outline: none;
  font-family: var(--font); min-width: 0; }
.keybar input:focus { border-color: var(--accent); }
.keybar button { border: 0; border-radius: 10px; padding: 0 16px; cursor: pointer;
  color: #04140d; background: var(--accent); font-weight: 600; font-size: 13px; white-space: nowrap; }
.hint { font-size: 12px; color: var(--muted); line-height: 1.55; }
.hint.saved { color: var(--accent); }

/* ── Messages wrap ── */
.messages-wrap {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
  -webkit-overflow-scrolling: touch;
}
.messages-wrap::-webkit-scrollbar { width: 0; }

/* ── Empty state (centred when no chat) ── */
.empty-state {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 18px; padding: 28px 20px; text-align: center;
}
.empty-state.hidden { display: none; }
.empty-title { font-family: 'Times New Roman', Georgia, serif; font-style: italic;
  font-size: 32px; font-weight: 500;
  background: linear-gradient(90deg, var(--accent-2), var(--accent));
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.empty-sub { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: .22em;
  text-transform: uppercase; color: var(--muted); margin-top: -10px; }
.empty-hint { font-size: 13px; color: var(--muted); line-height: 1.6; max-width: 280px; }

/* ── Chips ── */
.chips { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; }
.chip { padding: 7px 14px; border-radius: 20px; background: rgba(255,255,255,.04);
  border: 1px solid var(--line); color: var(--muted); font-size: 12.5px; font-weight: 500;
  cursor: pointer; white-space: nowrap; font-family: var(--font);
  transition: background .12s, border-color .12s, color .12s; }
.chip:hover, .chip:active { background: rgba(110,231,183,.10); border-color: rgba(110,231,183,.28); color: var(--fg); }

/* ── Feed (grows from bottom) ── */
.feed-spacer { flex: 1; }
.feed {
  display: flex; flex-direction: column; gap: 14px;
  padding: 18px 24px 6px;
}
.msg { max-width: 72%; }
.msg.user { align-self: flex-end; }
.msg.coach { align-self: flex-start; width: 66%; }
@media (max-width: 600px) { .msg { max-width: 90%; } .msg.coach { width: 90%; } }
.bubble { border-radius: 15px; padding: 13px 16px; font-size: 14.5px; line-height: 1.58; }
.msg.user .bubble { background: rgba(255,255,255,.055); border: 1px solid var(--line); }
.msg.coach .bubble { background: rgba(255,255,255,.04);
  border: 1px solid rgba(110,231,183,.22); border-left: 3px solid var(--accent); }
.tag { display: inline-block; margin-bottom: 9px; font-family: ui-monospace, monospace;
  font-size: 9.5px; font-weight: 700; letter-spacing: .10em; text-transform: uppercase;
  color: #04140d; background: var(--accent); padding: 3px 9px; border-radius: 999px; }
.pill { color: var(--accent); background: rgba(110,231,183,.13);
  padding: 1px 6px; border-radius: 6px; font-weight: 600; }
.reply-list { margin: 7px 0 0; padding-left: 18px; display: grid; gap: 6px; }
.reply-list li { line-height: 1.5; }
.msg-time { font-size: 10px; color: var(--muted); margin-top: 4px; padding: 0 4px; }
.msg.user .msg-time { text-align: right; }

/* typing dots */
.dots { display: inline-flex; gap: 5px; }
.dots i { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: .35;
  animation: d 1.2s ease-in-out infinite; font-style: normal; }
.dots i:nth-child(2){animation-delay:.2s} .dots i:nth-child(3){animation-delay:.4s}
@keyframes d { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:1;transform:scale(1.5)} }

/* ── Composer bar ── */
.composer-bar {
  flex-shrink: 0;
  border-top: 1px solid var(--line);
  padding: 10px 24px max(12px, env(safe-area-inset-bottom));
  background: var(--bg);
}
.clear-row { display: flex; justify-content: flex-end; margin-bottom: 8px; }
.clear-btn { background: none; border: none; color: var(--muted); font-size: 11px;
  cursor: pointer; padding: 2px 8px; border-radius: 6px; font-family: var(--font);
  transition: color .12s, background .12s; }
.clear-btn:hover { color: var(--fg); background: rgba(255,255,255,.05); }
.composer { display: flex; gap: 9px; align-items: flex-end; }
.composer textarea { flex: 1; background: rgba(255,255,255,.04); border: 1px solid var(--line);
  color: var(--fg); border-radius: 22px; padding: 12px 17px; font-size: 14.5px; outline: none;
  resize: none; line-height: 1.45; max-height: 110px; font-family: var(--font);
  transition: border-color .15s; }
.composer textarea:focus { border-color: rgba(110,231,183,.45); }
.composer textarea::placeholder { color: var(--muted); }
.composer button { width: 46px; height: 46px; border: 0; border-radius: 50%; cursor: pointer;
  color: #04140d; background: var(--accent); font-size: 20px; flex-shrink: 0;
  transition: transform .1s, opacity .15s; display: flex; align-items: center; justify-content: center; }
.composer button:active { transform: scale(.90); }
.composer button:disabled { opacity: .32; cursor: default; }
</style>
</head>
<body>
<div class="shell">

  <!-- ── Header ── -->
  <div class="header">
    <div class="top">
      <div class="orb" id="orb"></div>
      <div class="title"><h1>Nova</h1><div class="role">your mentor</div></div>
      <button id="keyToggle" class="key-toggle" title="OpenRouter API key">🔑</button>
    </div>
    <div class="keypanel" id="keypanel">
      <div class="keybar">
        <input id="keyInput" type="password" placeholder="paste your OpenRouter key (sk-or-…)" autocomplete="off" />
        <button id="keySave">Save</button>
      </div>
      <div class="hint" id="hint">
        Stored only in this browser. Get a free key at <b>openrouter.ai</b> → API keys.
      </div>
    </div>
  </div>

  <!-- ── Messages ── -->
  <div class="messages-wrap" id="messagesWrap">

    <!-- Empty / welcome state (centred) -->
    <div class="empty-state" id="emptyState">
      <div class="orb-hero" id="orbHero"></div>
      <div>
        <div class="empty-title">Nova</div>
        <div class="empty-sub">your AI mentor</div>
      </div>
      <div class="empty-hint" id="emptyHint">Ask me about your food, training, sleep, or where to start today.</div>
      <div class="chips">
        <button class="chip" data-q="How is my day looking overall?">How's my day?</button>
        <button class="chip" data-q="What should I eat next based on my macros?">What to eat next?</button>
        <button class="chip" data-q="Am I on track with my fitness goals this week?">On track?</button>
        <button class="chip" data-q="Which supplements should I prioritise right now?">Supplements?</button>
        <button class="chip" data-q="How is my recovery looking today?">Recovery?</button>
      </div>
    </div>

    <!-- Spacer pushes messages to bottom when few exist -->
    <div class="feed-spacer" id="feedSpacer"></div>

    <!-- Feed -->
    <div class="feed" id="feed"></div>

  </div>

  <!-- ── Composer bar ── -->
  <div class="composer-bar">
    <div class="clear-row" id="clearRow" style="display:none;">
      <button class="clear-btn" id="clearBtn">Clear chat</button>
    </div>
    <div class="composer">
      <textarea id="chatInput" placeholder="ask Nova anything…" rows="1"></textarea>
      <button id="send" aria-label="Send">↑</button>
    </div>
  </div>

</div><!-- /shell -->

<script>
(function(){
'use strict';

var KEY_LS      = 'nova_or_key';
var HISTORY_KEY = 'mentor:history';
var MAX_HIST    = 40;
var MODEL       = 'meta-llama/llama-3.3-70b-instruct:free';

var wrap      = document.getElementById('messagesWrap');
var feed      = document.getElementById('feed');
var feedSpacer= document.getElementById('feedSpacer');
var emptyState= document.getElementById('emptyState');
var input     = document.getElementById('chatInput');
var orbEl     = document.getElementById('orb');
var orbHero   = document.getElementById('orbHero');
var keyInput  = document.getElementById('keyInput');
var hintEl    = document.getElementById('hint');
var keypanel  = document.getElementById('keypanel');
var keyToggle = document.getElementById('keyToggle');
var clearRow  = document.getElementById('clearRow');

// ─── Utils ────────────────────────────────────────────────
function pad(n){ return n < 10 ? '0' + n : '' + n; }
function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function localDateOf(iso){ var d=new Date(iso); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fmtTime(ts){ return new Date(ts).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}); }
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function setOrb(s){
  orbEl.className  = 'orb'      + (s?' '+s:'');
  orbHero.className= 'orb-hero' + (s?' '+s:'');
}
function scrollBottom(){ wrap.scrollTop = wrap.scrollHeight; }

// ─── Key handling ──────────────────────────────────────────
function savedKey(){ try{ return localStorage.getItem(KEY_LS)||''; }catch(e){ return ''; } }
function markKeySaved(){
  hintEl.className='hint saved';
  hintEl.innerHTML='✓ Key saved in this browser. Ask away.';
  keyInput.placeholder='•••• key saved ••••';
  keyToggle.classList.add('has-key');
}
if(savedKey()) markKeySaved();

keyToggle.addEventListener('click',function(){ keypanel.classList.toggle('open'); });
document.getElementById('keySave').addEventListener('click',function(){
  var k=keyInput.value.trim(); if(!k) return;
  try{ localStorage.setItem(KEY_LS,k); }catch(e){}
  keyInput.value='';
  markKeySaved();
  keypanel.classList.remove('open');
});

// ─── Context ──────────────────────────────────────────────
function buildContext(){
  var today=todayStr(), now=new Date();
  var ctx='DATE/TIME: '+now.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'})+
          ' at '+now.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})+'\n\n';
  try{
    var meals=JSON.parse(localStorage.getItem('macro:meals:'+today)||'[]');
    var goals=JSON.parse(localStorage.getItem('macro:goals')||'{}');
    var tot=meals.reduce(function(a,m){return{cal:a.cal+(+m.cal||0),prot:a.prot+(+m.prot||0),carb:a.carb+(+m.carb||0),fat:a.fat+(+m.fat||0)};},{cal:0,prot:0,carb:0,fat:0});
    if(meals.length){
      ctx+='NUTRITION: '+Math.round(tot.cal)+' kcal'+(goals.cal?' / '+goals.cal+' target':'')+'. Protein '+tot.prot.toFixed(0)+'g'+(goals.prot?'/'+goals.prot+'g':'')+', Carbs '+tot.carb.toFixed(0)+'g, Fat '+tot.fat.toFixed(0)+'g.\n';
      ctx+='Meals: '+meals.map(function(m){return m.name;}).join('; ')+'\n\n';
    } else { ctx+='NUTRITION: No food logged yet today.\n\n'; }
  }catch(e){}
  try{
    var items=JSON.parse(localStorage.getItem('stack:items')||'[]');
    var taken=JSON.parse(localStorage.getItem('stack:taken:'+today)||'{}');
    if(items.length){
      var yes=items.filter(function(i){return taken[i.id];}).map(function(i){return i.name;});
      var no=items.filter(function(i){return !taken[i.id];}).map(function(i){return i.name;});
      ctx+='SUPPLEMENTS:\n';
      if(yes.length) ctx+='  Taken: '+yes.join(', ')+'\n';
      if(no.length)  ctx+='  Not yet: '+no.join(', ')+'\n\n';
    }
  }catch(e){}
  try{
    var w=JSON.parse(localStorage.getItem('po_water_v1')||'{}');
    var wDone=((w.logs||{})[today])||0;
    var wKg=((w.profile||{}).weightKg)||75;
    var uVol=w.unit==='glass'?(w.glassMl||250):(w.bottleMl||500);
    ctx+='HYDRATION: '+wDone+'/'+Math.max(1,Math.ceil(wKg*35/uVol))+' '+(w.unit||'bottle')+'s.\n\n';
  }catch(e){}
  try{
    var coach=JSON.parse(localStorage.getItem('po_coach_v1')||'{}');
    var doneMap=JSON.parse(localStorage.getItem('po_coach_workout_done')||'{}');
    if(coach.phase||coach.plan) ctx+='TRAINING: Phase '+(coach.phase||'?')+(coach.block?' · '+coach.block+' block':'')+'. Today: '+(doneMap[today]?'DONE ✓':'not done yet')+'.\n\n';
  }catch(e){}
  try{
    var pe=JSON.parse(localStorage.getItem('peak:entries')||'[]');
    var ti=pe.filter(function(e){return e.type==='intake'&&e.timestamp&&localDateOf(e.timestamp)===today;});
    if(ti.length) ctx+='STIMULANTS: '+ti.map(function(e){return e.substance+' '+e.dose_mg+'mg at '+new Date(e.timestamp).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});}).join('; ')+'.\n\n';
  }catch(e){}
  return ctx.trim();
}

// ─── History ──────────────────────────────────────────────
function loadHistory(){ try{ return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]'); }catch(e){ return []; } }
function saveHistory(h){ try{ localStorage.setItem(HISTORY_KEY,JSON.stringify(h.slice(-MAX_HIST))); }catch(e){} }

// ─── Render ───────────────────────────────────────────────
function inlineMark(s){ return esc(s).replace(/\*\*(.+?)\*\*/g,'<span class="pill">$1</span>'); }
function renderText(text){
  var lines=String(text).split(/\r?\n/).map(function(l){return l.trim();}).filter(Boolean);
  var items=[],loose=[];
  lines.forEach(function(l){
    if(/^[-•*]\s+/.test(l)) items.push('<li>'+inlineMark(l.replace(/^[-•*]\s+/,''))+'</li>');
    else loose.push(inlineMark(l));
  });
  var html=loose.join('<br>');
  if(items.length) html+=(html?'<br>':'')+'<ul class="reply-list">'+items.join('')+'</ul>';
  return html;
}

var messages=loadHistory();

function renderFeed(){
  var hasMsg = messages.length > 0;
  emptyState.classList.toggle('hidden', hasMsg);
  feedSpacer.style.display = hasMsg ? '' : 'none';
  clearRow.style.display   = hasMsg ? '' : 'none';
  feed.innerHTML='';
  messages.forEach(function(m){ feed.appendChild(makeBubble(m)); });
  scrollBottom();
}

function makeBubble(m){
  var wrap=document.createElement('div');
  wrap.className='msg '+(m.role==='user'?'user':'coach');
  if(m.role==='user'){
    wrap.innerHTML='<div class="bubble">'+esc(m.content)+'</div><div class="msg-time">'+fmtTime(m.ts||Date.now())+'</div>';
  } else {
    wrap.innerHTML='<div class="bubble"><span class="tag">Nova</span><div>'+renderText(m.content)+'</div></div><div class="msg-time">'+fmtTime(m.ts||Date.now())+'</div>';
  }
  return wrap;
}

// ─── Send ─────────────────────────────────────────────────
var busy=false;

async function ask(text){
  text=(text||'').trim(); if(!text||busy) return;
  var key=savedKey();
  if(!key){ keypanel.classList.add('open'); keyInput.focus(); return; }
  busy=true; setSendDisabled(true);

  messages.push({role:'user',content:text,ts:Date.now()});
  saveHistory(messages);
  renderFeed();
  clearInput();
  setOrb('think');

  var typingEl=document.createElement('div');
  typingEl.className='msg coach';
  typingEl.innerHTML='<div class="bubble"><span class="tag">Nova</span><div><span class="dots"><i></i><i></i><i></i></span></div></div>';
  feed.appendChild(typingEl);
  scrollBottom();

  try{
    var apiMsgs=[
      {role:'system',content:'You are Nova, a personal health and performance mentor.\n\nDASHBOARD DATA:\n'+buildContext()+'\n\nGive honest, specific, short advice. Use bullet points starting with "- ". Wrap key numbers in **double asterisks**. End with "- Do today:" plus one action.'},
    ].concat(messages.slice(-20).map(function(m){return{role:m.role==='assistant'?'assistant':m.role,content:m.content};}));
    var res=await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key,'HTTP-Referer':'https://lucasdashboard.app','X-Title':'Lucas Dashboard Nova'},
      body:JSON.stringify({model:MODEL,messages:apiMsgs,max_tokens:500}),
    });
    var json=await res.json();
    if(json.error) throw new Error(json.error.message||'OpenRouter error');
    var reply=(json.choices&&json.choices[0]&&json.choices[0].message&&json.choices[0].message.content)||'…';
    messages.push({role:'assistant',content:reply.trim(),ts:Date.now()});
    setOrb('happy'); setTimeout(function(){setOrb('');},2500);
  }catch(err){
    messages.push({role:'assistant',content:'- Could not reach OpenRouter — check your key and connection.\n- Error: '+err.message,ts:Date.now()});
    setOrb('');
  }

  typingEl.remove();
  saveHistory(messages);
  renderFeed();
  busy=false;
  setSendDisabled(false);
}

function setSendDisabled(on){ var b=document.getElementById('send'); if(b) b.disabled=on; }
function clearInput(){ input.value=''; input.style.height='auto'; }

// ─── Events ───────────────────────────────────────────────
document.getElementById('send').addEventListener('click',function(){ask(input.value);});
input.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ask(this.value);}
});
input.addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,110)+'px';
});
document.getElementById('clearBtn').addEventListener('click',function(){
  messages=[];saveHistory(messages);renderFeed();
});
document.querySelectorAll('.chip').forEach(function(btn){
  btn.addEventListener('click',function(){ask(this.dataset.q);});
});

// Auto-send from main page (#q=...)
var hash=window.location.hash;
if(hash&&hash.indexOf('#q=')===0){
  var autoQ=decodeURIComponent(hash.slice(3));
  history.replaceState(null,'',window.location.pathname);
  if(autoQ) setTimeout(function(){ask(autoQ);},300);
}

// ─── Boot ─────────────────────────────────────────────────
if(!savedKey()){
  document.getElementById('emptyHint').textContent='Tap 🔑 above and paste your OpenRouter key to get started.';
}
renderFeed();

})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Profile — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary:    #FAFAFA;
  --text-secondary:  #B8B6B0;
  --text-tertiary:   #76746E;
  --text-quaternary: #4A4845;
  --border-soft:     rgba(255,255,255,0.07);
  --bg-card:         rgba(255,255,255,0.04);
  --accent:          #E879F9;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #050506; color: var(--text-secondary);
  font-family: var(--font); -webkit-font-smoothing: antialiased; min-height: 100vh;
}
body {
  padding: max(28px, env(safe-area-inset-top))
           max(20px, env(safe-area-inset-right))
           max(80px, env(safe-area-inset-bottom))
           max(20px, env(safe-area-inset-left));
}
main { max-width: 500px; margin: 0 auto; padding-top: 32px; display: flex; flex-direction: column; gap: 16px; }

.page-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-quaternary); margin-bottom: 6px; }
.page-title   { font-size: 26px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.03em; }

/* ── Card ── */
.section-card {
  background: var(--bg-card); border: 1px solid var(--border-soft);
  border-radius: 18px; padding: 20px;
}
.section-heading {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-quaternary); margin-bottom: 16px;
}

/* ── Unit toggle ── */
.unit-row { display: flex; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
.unit-group { display: flex; align-items: center; gap: 8px; }
.unit-group-label { font-size: 12px; color: var(--text-tertiary); font-weight: 600; }
.unit-toggle { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.10); }
.unit-btn {
  padding: 5px 11px; font-size: 12px; font-weight: 700; font-family: var(--font);
  background: none; border: none; color: var(--text-quaternary); cursor: pointer;
  transition: background 0.12s, color 0.12s;
}
.unit-btn.active { background: rgba(232,121,249,0.18); color: var(--accent); }

/* ── Field ── */
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
.field-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.field-hint { font-size: 11px; color: var(--text-quaternary); font-family: var(--font-mono); }
.field-input {
  width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10);
  border-radius: 12px; padding: 12px 15px; color: var(--text-primary);
  font-size: 16px; font-weight: 600; font-family: var(--font-mono);
  outline: none; transition: border-color 0.15s, background 0.15s; -webkit-appearance: none;
  color-scheme: dark;
}
.field-input:focus { border-color: rgba(232,121,249,0.45); background: rgba(255,255,255,0.06); }
.field-input::placeholder { color: var(--text-quaternary); font-weight: 400; }
input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

/* ── Timeframe row ── */
.timeframe-row { display: flex; gap: 10px; align-items: stretch; }
.timeframe-row .field-input { flex: 1; }
.timeframe-unit-toggle { display: flex; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.10); flex-shrink: 0; }
.timeframe-unit-toggle .unit-btn { padding: 0 14px; font-size: 12px; }

/* ── Difficulty badge ── */
.difficulty-box {
  margin-top: 12px; padding: 13px 16px; border-radius: 12px;
  display: flex; align-items: flex-start; gap: 12px;
}
.difficulty-box[hidden] { display: none; }
.diff-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.diff-body { flex: 1; }
.diff-rate  { font-size: 12px; color: var(--text-tertiary); font-family: var(--font-mono); margin-bottom: 3px; }
.diff-label { font-size: 14px; font-weight: 700; }
.diff-desc  { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; line-height: 1.4; }
.diff-easy     { background: rgba(48,209,88,0.07);   border: 1px solid rgba(48,209,88,0.2); }
.diff-moderate { background: rgba(255,214,10,0.07);  border: 1px solid rgba(255,214,10,0.2); }
.diff-hard     { background: rgba(255,159,10,0.07);  border: 1px solid rgba(255,159,10,0.2); }
.diff-veryhard { background: rgba(255,107,107,0.07); border: 1px solid rgba(255,107,107,0.2); }
.diff-extreme  { background: rgba(255,50,50,0.09);   border: 1px solid rgba(255,50,50,0.25); }
.diff-easy     .diff-label { color: #30D158; }
.diff-moderate .diff-label { color: #FFD60A; }
.diff-hard     .diff-label { color: #FF9F0A; }
.diff-veryhard .diff-label { color: #FF6B6B; }
.diff-extreme  .diff-label { color: #FF3B30; }

/* ── Sleep wake display ── */
.wake-display {
  margin-top: 10px; padding: 11px 15px; border-radius: 11px;
  background: rgba(125,211,252,0.06); border: 1px solid rgba(125,211,252,0.15);
  font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px;
}
.wake-display[hidden] { display: none; }
.wake-display strong { color: #7DD3FC; }

/* ── Save ── */
.save-btn {
  width: 100%; padding: 14px; border-radius: 14px; border: none;
  background: rgba(232,121,249,0.12); color: var(--accent);
  font-size: 15px; font-weight: 700; font-family: var(--font);
  cursor: pointer; transition: background 0.15s, transform 0.10s; letter-spacing: -0.01em;
}
.save-btn:hover  { background: rgba(232,121,249,0.20); }
.save-btn:active { transform: scale(0.98); }
.save-btn.saved  { background: rgba(48,209,88,0.15); color: #30D158; }

/* ── Stats grid ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 14px; padding: 16px; text-align: center; }
.stat-value { font-size: 20px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.03em; font-family: var(--font-mono); line-height: 1; }
.stat-label { font-size: 10px; color: var(--text-tertiary); margin-top: 5px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
.stat-value.green  { color: #30D158; }
.stat-value.yellow { color: #FFD60A; }
.stat-value.orange { color: #FF9F0A; }
.stat-value.red    { color: #FF6B6B; }
.stat-value.blue   { color: #7DD3FC; }
.stat-value.purple { color: var(--accent); }

/* ── Connected insights ── */
.insight-row {
  display: flex; align-items: center; gap: 12px; padding: 11px 0;
  border-bottom: 1px solid var(--border-soft);
}
.insight-row:last-child { border-bottom: none; padding-bottom: 0; }
.insight-icon { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
.insight-body { flex: 1; min-width: 0; }
.insight-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.insight-sub   { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
.insight-value { font-family: var(--font-mono); font-size: 12px; font-weight: 700; flex-shrink: 0; }
.insight-bar-wrap { height: 4px; background: rgba(255,255,255,0.07); border-radius: 99px; margin-top: 5px; }
.insight-bar { height: 4px; border-radius: 99px; transition: width 0.4s; }
.bar-green  { background: #30D158; }
.bar-yellow { background: #FFD60A; }
.bar-orange { background: #FF9F0A; }
.bar-red    { background: #FF6B6B; }
.bar-blue   { background: #7DD3FC; }
.bar-purple { background: var(--accent); }
</style>
</head>
<body>
<main>
  <div>
    <div class="page-eyebrow">My info</div>
    <div class="page-title">Profile</div>
  </div>

  <!-- ── Body ── -->
  <div class="section-card">
    <div class="section-heading">Body</div>
    <div class="unit-row">
      <div class="unit-group">
        <span class="unit-group-label">Weight</span>
        <div class="unit-toggle">
          <button class="unit-btn active" data-unit-group="weight" data-unit="kg">kg</button>
          <button class="unit-btn"        data-unit-group="weight" data-unit="lbs">lbs</button>
        </div>
      </div>
      <div class="unit-group">
        <span class="unit-group-label">Height</span>
        <div class="unit-toggle">
          <button class="unit-btn active" data-unit-group="height" data-unit="cm">cm</button>
          <button class="unit-btn"        data-unit-group="height" data-unit="in">in</button>
        </div>
      </div>
    </div>

    <div class="field">
      <div class="field-row"><span class="field-name">Age</span><span class="field-hint">years</span></div>
      <input id="fieldAge" class="field-input" type="number" min="1" max="120" step="1" placeholder="e.g. 24" inputmode="numeric" />
    </div>
    <div class="field">
      <div class="field-row"><span class="field-name">Weight</span><span class="field-hint" id="hintWeight">kg</span></div>
      <input id="fieldWeight" class="field-input" type="number" min="1" max="700" step="0.1" placeholder="e.g. 80" inputmode="decimal" />
    </div>
    <div class="field">
      <div class="field-row"><span class="field-name">Height</span><span class="field-hint" id="hintHeight">cm</span></div>
      <input id="fieldHeight" class="field-input" type="number" min="1" max="120" step="0.1" placeholder="e.g. 178" inputmode="decimal" />
    </div>
  </div>

  <!-- ── Weight Goal ── -->
  <div class="section-card">
    <div class="section-heading">Weight Goal</div>
    <div class="field">
      <div class="field-row"><span class="field-name">Goal weight</span><span class="field-hint" id="hintGoalWeight">kg</span></div>
      <input id="fieldGoalWeight" class="field-input" type="number" min="1" max="700" step="0.1" placeholder="e.g. 75" inputmode="decimal" />
    </div>
    <div class="field" style="margin-top:14px">
      <div class="field-row"><span class="field-name">Time to reach goal</span><span class="field-hint" id="hintTimeframe">weeks</span></div>
      <div class="timeframe-row">
        <input id="fieldTimeframe" class="field-input" type="number" min="1" max="520" step="1" placeholder="e.g. 12" inputmode="numeric" />
        <div class="timeframe-unit-toggle unit-toggle">
          <button class="unit-btn active" data-unit-group="timeframe" data-unit="weeks">wks</button>
          <button class="unit-btn"        data-unit-group="timeframe" data-unit="months">mo</button>
        </div>
      </div>
    </div>
    <div id="difficultyBox" class="difficulty-box" hidden>
      <span class="diff-icon" id="diffIcon"></span>
      <div class="diff-body">
        <div class="diff-rate"  id="diffRate"></div>
        <div class="diff-label" id="diffLabel"></div>
        <div class="diff-desc"  id="diffDesc"></div>
      </div>
    </div>
  </div>

  <!-- ── Sleep ── -->
  <div class="section-card">
    <div class="section-heading">Sleep Schedule</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div class="field" style="margin-bottom:0">
        <div class="field-row"><span class="field-name">🌙 Bedtime</span></div>
        <input id="fieldBedtime" class="field-input" type="time" />
      </div>
      <div class="field" style="margin-bottom:0">
        <div class="field-row"><span class="field-name">☀️ Wake time</span></div>
        <input id="fieldWakeTime" class="field-input" type="time" />
      </div>
    </div>
    <div id="sleepSummary" class="wake-display" hidden>
      <span>😴</span>
      <span id="sleepSummaryText"></span>
    </div>
  </div>

  <button id="saveBtn" class="save-btn">Save profile</button>

  <!-- ── Stats ── -->
  <div id="statsGrid" class="stats-grid" style="display:none"></div>

  <!-- ── Connected insights ── -->
  <div id="insightsCard" class="section-card" style="display:none">
    <div class="section-heading">Today at a glance</div>
    <div id="insightsBody"></div>
  </div>
</main>

<script>
(function () {
  const STORE_KEY = 'profile:data';
  const $ = id => document.getElementById(id);

  const f = {
    age:        $('fieldAge'),
    weight:     $('fieldWeight'),
    height:     $('fieldHeight'),
    goalWeight: $('fieldGoalWeight'),
    timeframe:  $('fieldTimeframe'),
    bedtime:    $('fieldBedtime'),
    wakeTime:   $('fieldWakeTime'),
  };

  let units = { weight: 'kg', height: 'cm', timeframe: 'weeks' };

  // ── Conversions ──────────────────────────────────────────────────
  const KG_TO_LBS = 2.20462, CM_TO_IN = 0.393701;
  const toKg   = (v, u) => u === 'lbs' ? v / KG_TO_LBS : v;
  const fromKg = (v, u) => u === 'lbs' ? v * KG_TO_LBS : v;
  const toCm   = (v, u) => u === 'in'  ? v / CM_TO_IN  : v;
  const fromCm = (v, u) => u === 'in'  ? v * CM_TO_IN  : v;
  const fmt    = (v, d) => parseFloat(v.toFixed(d));

  function toWeeks(val, unit) { return unit === 'months' ? val * 4.33 : val; }

  function sleepDuration(bedtime, wakeTime) {
    // returns hours; handles crossing midnight
    const toH = t => parseInt(t.split(':')[0]) + parseInt(t.split(':')[1]) / 60;
    let dur = toH(wakeTime) - toH(bedtime);
    if (dur <= 0) dur += 24;
    return dur;
  }

  // ── Helpers ──────────────────────────────────────────────────────
  function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function ls(key) { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } }

  function fmt12(hhmm) {
    if (!hhmm) return '';
    const [h, m] = hhmm.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${ampm}`;
  }
  function addHoursToTime(hhmm, hrs) {
    const [h, m] = hhmm.split(':').map(Number);
    const total = h * 60 + m + Math.round(hrs * 60);
    const wh = Math.floor(total / 60) % 24;
    const wm = total % 60;
    return String(wh).padStart(2,'0') + ':' + String(wm).padStart(2,'0');
  }

  // ── Unit toggles ─────────────────────────────────────────────────
  function updateHints() {
    $('hintWeight').textContent     = units.weight;
    $('hintGoalWeight').textContent = units.weight;
    $('hintHeight').textContent     = units.height;
    $('hintTimeframe').textContent  = units.timeframe;
  }

  document.querySelectorAll('.unit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const group = btn.dataset.unitGroup, newU = btn.dataset.unit, oldU = units[group];
      if (newU === oldU) return;
      if (group === 'weight') {
        const conv = v => { const kg = toKg(parseFloat(v), oldU); return isNaN(kg) ? '' : fmt(fromKg(kg, newU), 1); };
        if (f.weight.value)     f.weight.value     = conv(f.weight.value);
        if (f.goalWeight.value) f.goalWeight.value = conv(f.goalWeight.value);
      } else if (group === 'height') {
        const cm = toCm(parseFloat(f.height.value), oldU);
        if (!isNaN(cm)) f.height.value = fmt(fromCm(cm, newU), 1);
      }
      units[group] = newU;
      document.querySelectorAll(`[data-unit-group="${group}"]`).forEach(b => b.classList.toggle('active', b.dataset.unit === newU));
      updateHints();
      recalc();
    });
  });

  // ── Recalculate ───────────────────────────────────────────────────
  function recalc() {
    const wRaw = parseFloat(f.weight.value);
    const hRaw = parseFloat(f.height.value);
    const gRaw = parseFloat(f.goalWeight.value);
    const tRaw = parseFloat(f.timeframe.value);
    const bed  = f.bedtime.value;
    const wake = f.wakeTime.value;
    const sg   = (bed && wake) ? sleepDuration(bed, wake) : null;

    const wKg  = isNaN(wRaw) ? null : toKg(wRaw, units.weight);
    const hCm  = isNaN(hRaw) ? null : toCm(hRaw, units.height);
    const gKg  = isNaN(gRaw) ? null : toKg(gRaw, units.weight);

    // ── Difficulty ──
    const diffBox = $('difficultyBox');
    if (wKg && gKg && !isNaN(tRaw) && tRaw > 0) {
      const weeks   = toWeeks(tRaw, units.timeframe);
      const diffKg  = wKg - gKg;
      const rateKg  = Math.abs(diffKg) / weeks;
      const rateDisp = units.weight === 'lbs' ? fmt(fromKg(rateKg, 'lbs'), 2) : fmt(rateKg, 2);
      $('diffRate').textContent = `${rateDisp} ${units.weight}/week required`;

      let cls, icon, label, desc;
      if (Math.abs(diffKg) < 0.3) {
        cls = 'diff-easy'; icon = '🎯'; label = "You're already there!"; desc = 'You\'re within range of your goal weight.';
      } else if (rateKg <= 0.25) {
        cls = 'diff-easy'; icon = '🟢'; label = 'Easy'; desc = 'Gentle and very sustainable — minimal lifestyle change needed.';
      } else if (rateKg <= 0.5) {
        cls = 'diff-moderate'; icon = '🟡'; label = 'Moderate'; desc = 'A healthy, sustainable pace — the recommended range.';
      } else if (rateKg <= 0.75) {
        cls = 'diff-hard'; icon = '🟠'; label = 'Hard'; desc = 'Challenging — requires consistent discipline with diet and training.';
      } else if (rateKg <= 1.0) {
        cls = 'diff-veryhard'; icon = '🔴'; label = 'Very Hard'; desc = 'Aggressive deficit needed — consider extending your timeline.';
      } else {
        cls = 'diff-extreme'; icon = '⚠️'; label = 'Extreme'; desc = 'Not recommended — high risk of muscle loss and fatigue. Extend your timeline.';
      }

      diffBox.className = 'difficulty-box ' + cls;
      $('diffIcon').textContent  = icon;
      $('diffLabel').textContent = label;
      $('diffDesc').textContent  = desc;
      diffBox.hidden = false;
    } else {
      diffBox.hidden = true;
    }

    // ── Sleep summary ──
    const sleepSum = $('sleepSummary');
    if (bed && wake) {
      const dur = sleepDuration(bed, wake);
      const hrs = Math.floor(dur), mins = Math.round((dur % 1) * 60);
      const durStr = mins ? `${hrs}h ${mins}m` : `${hrs}h`;
      const quality = dur >= 8 ? '✅ Great' : dur >= 7 ? '👍 Good' : dur >= 6 ? '⚠️ Short' : '❌ Too short';
      $('sleepSummaryText').innerHTML =
        `<strong>${fmt12(bed)}</strong> → <strong>${fmt12(wake)}</strong> · <strong>${durStr}</strong> sleep · ${quality}`;
      sleepSum.hidden = false;
    } else {
      sleepSum.hidden = true;
    }

    // ── Stats grid ──
    const cards = [];
    if (wKg && hCm) {
      const bmi = wKg / ((hCm / 100) ** 2);
      const cls = bmi < 18.5 || bmi > 30 ? 'red' : bmi > 25 ? 'orange' : 'green';
      cards.push(`<div class="stat-card"><div class="stat-value ${cls}">${bmi.toFixed(1)}</div><div class="stat-label">BMI</div></div>`);
    }
    if (wKg && gKg) {
      const diffDisp = units.weight === 'lbs' ? fmt(fromKg(wKg - gKg, 'lbs'), 1) : fmt(wKg - gKg, 1);
      const abs = Math.abs(diffDisp), sign = diffDisp > 0 ? '−' : '+';
      const cls = abs < 0.5 ? 'green' : abs < 5 ? 'yellow' : 'orange';
      cards.push(`<div class="stat-card"><div class="stat-value ${cls}">${sign}${abs} ${units.weight}</div><div class="stat-label">To goal</div></div>`);
    }
    if (bed) {
      cards.push(`<div class="stat-card"><div class="stat-value purple">${fmt12(bed)}</div><div class="stat-label">Bedtime</div></div>`);
    }
    if (wake) {
      cards.push(`<div class="stat-card"><div class="stat-value blue">${fmt12(wake)}</div><div class="stat-label">Wake time</div></div>`);
    }
    if (sg != null) {
      const hrs = Math.floor(sg), mins = Math.round((sg % 1) * 60);
      const durStr = mins ? `${hrs}h ${mins}m` : `${hrs}h`;
      const cls = sg >= 8 ? 'green' : sg >= 7 ? 'yellow' : 'red';
      cards.push(`<div class="stat-card"><div class="stat-value ${cls}">${durStr}</div><div class="stat-label">Sleep</div></div>`);
    }

    const grid = $('statsGrid');
    if (cards.length) {
      grid.innerHTML = cards.join('');
      grid.style.display = 'grid';
      grid.style.gridTemplateColumns = '1fr 1fr';
    } else {
      grid.style.display = 'none';
    }

    // ── Connected insights ──
    renderInsights(wKg, gKg, sg, bed, wake);
  }

  // ── Connected insights — reads all tabs ──────────────────────────
  function renderInsights(wKg, gKg, sgHrs, bedtime, wakeTime) {
    const today = todayKey();
    const rows = [];

    // Calories (health.html)
    const meals = ls(`macro:meals:${today}`) || [];
    const goals = ls('macro:goals') || {};
    if (meals.length || goals.cal) {
      const eaten = meals.reduce((s, m) => s + (m.cal || 0), 0);
      const goal  = goals.cal || 0;
      const pct   = goal ? Math.min(100, Math.round(eaten / goal * 100)) : null;
      const cls   = !pct ? 'bar-blue' : pct >= 90 ? 'bar-green' : pct >= 60 ? 'bar-yellow' : 'bar-orange';
      const valCls = !pct ? 'blue' : pct >= 90 ? 'green' : pct >= 60 ? 'yellow' : 'orange';
      rows.push({
        icon: '🔥', title: 'Calories',
        sub: goal ? `${eaten.toLocaleString()} / ${goal.toLocaleString()} kcal` : `${eaten.toLocaleString()} kcal logged`,
        value: pct != null ? `${pct}%` : '', valueCls: valCls,
        bar: pct, barCls: cls,
      });
    }

    // Protein (health.html)
    if (meals.length && goals.prot) {
      const eaten = +meals.reduce((s, m) => s + (m.prot || 0), 0).toFixed(1);
      const goal  = goals.prot;
      const pct   = Math.min(100, Math.round(eaten / goal * 100));
      const cls   = pct >= 90 ? 'bar-orange' : pct >= 60 ? 'bar-yellow' : 'bar-red';
      rows.push({
        icon: '🥩', title: 'Protein',
        sub: `${eaten}g / ${goal}g`,
        value: `${pct}%`, valueCls: pct >= 90 ? 'green' : 'orange',
        bar: pct, barCls: cls,
      });
    }

    // Water (health.html / po-water.html)
    const waterState = ls('po_water_v1');
    if (waterState) {
      const done  = (waterState.logs || {})[today] || 0;
      const unitVol = waterState.unit === 'glass' ? (waterState.glassMl || 250)
                    : waterState.unit === 'oz'    ? 30
                    : waterState.unit === 'ml'    ? 1
                    : (waterState.bottleMl || 500);
      const p     = waterState.profile || {};
      const wKgW  = waterState.weightUnit === 'lb' ? (p.weightKg || 0) / 2.20462 : (p.weightKg || 0);
      const base  = wKgW * 35;
      const totalMl = base + ((p.activityHrsPerWeek || 0) / 7 * 500);
      const total = Math.max(1, Math.ceil(totalMl / unitVol));
      const pct   = Math.min(100, Math.round(done / total * 100));
      const cls   = pct >= 100 ? 'bar-green' : pct >= 60 ? 'bar-blue' : 'bar-red';
      rows.push({
        icon: '💧', title: 'Water',
        sub: `${done} / ${total} ${waterState.unit || 'bottle'}s`,
        value: `${pct}%`, valueCls: pct >= 100 ? 'green' : 'blue',
        bar: pct, barCls: cls,
      });
    }

    // Supplements (health.html)
    const stackItems  = ls('stack:items') || [];
    const stackTaken  = ls(`stack:taken:${today}`) || {};
    if (stackItems.length) {
      const total  = stackItems.length;
      const taken  = stackItems.filter(item => stackTaken[item.name]).length;
      const pct    = Math.round(taken / total * 100);
      const cls    = pct >= 100 ? 'bar-green' : pct >= 50 ? 'bar-yellow' : 'bar-red';
      rows.push({
        icon: '💊', title: 'Supplements',
        sub: `${taken} / ${total} taken today`,
        value: `${pct}%`, valueCls: pct >= 100 ? 'green' : pct >= 50 ? 'yellow' : 'red',
        bar: pct, barCls: cls,
      });
    }

    // Workout done today (gym.html)
    const workoutDone = ls('po_coach_workout_done') || {};
    const didWorkout  = !!workoutDone[today];
    const program     = ls('po_coach_v1');
    if (program) {
      rows.push({
        icon: '💪', title: 'Workout',
        sub: didWorkout ? 'Session logged today' : 'No session logged yet',
        value: didWorkout ? 'Done' : '—', valueCls: didWorkout ? 'green' : 'red',
        bar: null,
      });
    }

    // Weight toward goal
    if (wKg && gKg) {
      const weights = ls('po_coach_weights') || [];
      const latest  = weights.length ? weights[weights.length - 1] : null;
      const disp    = units.weight === 'lbs' ? fmt(fromKg(wKg, 'lbs'), 1) + ' lbs' : wKg + ' kg';
      const goalDisp = units.weight === 'lbs' ? fmt(fromKg(gKg, 'lbs'), 1) + ' lbs' : gKg + ' kg';
      rows.push({
        icon: '⚖️', title: 'Weight progress',
        sub: `${disp} → goal ${goalDisp}${latest ? ' · last logged ' + (latest.date || '') : ''}`,
        value: '', valueCls: '',
        bar: null,
      });
    }

    // Sleep
    if (bedtime && wakeTime) {
      const dur = sleepDuration(bedtime, wakeTime);
      const hrs = Math.floor(dur), mins = Math.round((dur % 1) * 60);
      const durStr = mins ? `${hrs}h ${mins}m` : `${hrs}h`;
      const cls = dur >= 8 ? 'green' : dur >= 7 ? 'yellow' : 'red';
      rows.push({
        icon: '😴', title: 'Sleep schedule',
        sub: `Bed ${fmt12(bedtime)} → wake ${fmt12(wakeTime)} · ${durStr}`,
        value: durStr, valueCls: cls,
        bar: null,
      });
    }

    const card = $('insightsCard');
    if (!rows.length) { card.style.display = 'none'; return; }

    $('insightsBody').innerHTML = rows.map(r => `
      <div class="insight-row">
        <div class="insight-icon">${r.icon}</div>
        <div class="insight-body">
          <div class="insight-title">${r.title}</div>
          <div class="insight-sub">${r.sub}</div>
          ${r.bar != null ? `<div class="insight-bar-wrap"><div class="insight-bar ${r.barCls}" style="width:${r.bar}%"></div></div>` : ''}
        </div>
        ${r.value ? `<div class="insight-value ${r.valueCls}">${r.value}</div>` : ''}
      </div>`).join('');
    card.style.display = 'block';
  }

  // ── Persistence ───────────────────────────────────────────────────
  function load() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; } }

  function doSave() {
    const bed  = f.bedtime.value  || null;
    const wake = f.wakeTime.value || null;
    const data = {
      weightUnit: units.weight, heightUnit: units.height, timeframeUnit: units.timeframe,
      age:        parseFloat(f.age.value)        || null,
      weight:     parseFloat(f.weight.value)     || null,
      height:     parseFloat(f.height.value)     || null,
      goalWeight: parseFloat(f.goalWeight.value) || null,
      timeframe:  parseFloat(f.timeframe.value)  || null,
      bedtime:    bed,
      wakeTime:   wake,
      sleepGoal:  (bed && wake) ? sleepDuration(bed, wake) : null,
    };
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
  }

  function init() {
    const d = load();
    if (d.weightUnit)    { units.weight    = d.weightUnit;    document.querySelectorAll('[data-unit-group="weight"]').forEach(b => b.classList.toggle('active', b.dataset.unit === d.weightUnit)); }
    if (d.heightUnit)    { units.height    = d.heightUnit;    document.querySelectorAll('[data-unit-group="height"]').forEach(b => b.classList.toggle('active', b.dataset.unit === d.heightUnit)); }
    if (d.timeframeUnit) { units.timeframe = d.timeframeUnit; document.querySelectorAll('[data-unit-group="timeframe"]').forEach(b => b.classList.toggle('active', b.dataset.unit === d.timeframeUnit)); }
    updateHints();
    if (d.age)        f.age.value       = d.age;
    if (d.weight)     f.weight.value    = d.weight;
    if (d.height)     f.height.value    = d.height;
    if (d.goalWeight) f.goalWeight.value= d.goalWeight;
    if (d.timeframe)  f.timeframe.value = d.timeframe;
    if (d.bedtime)  f.bedtime.value  = d.bedtime;
    if (d.wakeTime) f.wakeTime.value = d.wakeTime;
    recalc();
  }

  $('saveBtn').addEventListener('click', () => {
    doSave();
    recalc();
    const btn = $('saveBtn');
    btn.textContent = 'Saved ✓';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'Save profile'; btn.classList.remove('saved'); }, 1800);
  });

  Object.values(f).forEach(el => {
    el.addEventListener('input', recalc);
    el.addEventListener('keydown', e => { if (e.key === 'Enter') $('saveBtn').click(); });
  });

  // Refresh insights when other tabs update localStorage
  window.addEventListener('storage', () => {
    const d = load();
    recalc();
  });

  init();
})();
</script>
</body>
</html>

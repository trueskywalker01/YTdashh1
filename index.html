<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lucas' Dashboard</title>
<style>
:root {
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --radius: 22px;
  --gap: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #050506;
  color: #FAFAFA;
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100dvh;
  -webkit-text-size-adjust: 100%;
}

body {
  padding:
    max(18px, env(safe-area-inset-top))
    max(16px, env(safe-area-inset-right))
    max(18px, env(safe-area-inset-bottom))
    max(16px, env(safe-area-inset-left));
  display: flex;
  flex-direction: column;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.013) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: 0;
}

.hub {
  position: relative;
  z-index: 1;
  max-width: 820px;
  width: 100%;
  margin: 0 auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── Header ── */
.hub-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 2px 4px;
}
.hub-title {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
}
.hub-date {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: rgba(255,255,255,0.18);
}

/* ── Grid ── */
.hub-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: 1fr 0.65fr 0.85fr;
  gap: var(--gap);
  flex: 1;
  min-height: 0;
}

/* grid placements */
.card-01 { grid-column: 1 / 3; grid-row: 1 / 3; }
.card-02 { grid-column: 3 / 5; grid-row: 1; }
.card-03 { grid-column: 3 / 4; grid-row: 2; }
.card-04 { grid-column: 4 / 5; grid-row: 2; }
.card-05 { grid-column: 1 / 3; grid-row: 3; }
.card-06 { grid-column: 3 / 4; grid-row: 3; }
.card-07 { grid-column: 4 / 5; grid-row: 3; }

/* ── Card base ── */
.hub-card {
  position: relative;
  border-radius: var(--radius);
  padding: 16px;
  text-decoration: none;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.055);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 110px;
  transition:
    transform 0.18s cubic-bezier(0.22, 1, 0.36, 1),
    background 0.18s,
    box-shadow 0.18s;
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
}
.hub-card:hover {
  background: rgba(255, 255, 255, 0.07);
  transform: translateY(-2px);
  box-shadow: 0 14px 40px rgba(0, 0, 0, 0.5), 0 1px 0 rgba(255,255,255,0.06) inset;
}
.hub-card:active {
  transform: scale(0.975);
  transition-duration: 0.08s;
}

/* glow layer */
.hub-card::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: inherit;
  pointer-events: none;
  transition: opacity 0.22s;
}
.hub-card:hover::before { filter: brightness(1.25); }

/* individual glows */
.card-01::before { background: radial-gradient(ellipse at 18% 88%, rgba(107,227,164,0.20) 0%, transparent 52%); }
.card-02::before { background: radial-gradient(ellipse at 88% 12%, rgba(255,159,10,0.22) 0%, transparent 55%); }
.card-03::before { background: radial-gradient(ellipse at 82% 16%, rgba(255,69,58,0.24) 0%, transparent 60%); }
.card-04::before { background: radial-gradient(ellipse at 82% 16%, rgba(100,210,255,0.24) 0%, transparent 60%); }
.card-05::before { background: radial-gradient(ellipse at 88% 14%, rgba(216,171,48,0.20) 0%, transparent 55%); }
.card-06::before { background: radial-gradient(ellipse at 82% 14%, rgba(180,120,60,0.20) 0%, transparent 58%); }
.card-07::before { background: radial-gradient(ellipse at 82% 14%, rgba(232,121,249,0.22) 0%, transparent 58%); }

/* ── Card content ── */
.card-num {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.10em;
  color: rgba(255,255,255,0.20);
  line-height: 1;
  position: relative; z-index: 1;
}

.card-icon {
  position: absolute;
  top: 14px; right: 16px;
  font-size: 26px;
  line-height: 1;
  filter: saturate(0.75) brightness(0.95);
  z-index: 1;
}

.card-footer {
  margin-top: auto;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  position: relative; z-index: 1;
}
.card-title {
  font-size: 18px;
  font-weight: 700;
  color: #FAFAFA;
  letter-spacing: -0.022em;
  line-height: 1.1;
  margin-bottom: 3px;
}
.card-sub {
  font-size: 11.5px;
  color: rgba(255,255,255,0.36);
  font-weight: 500;
  line-height: 1.3;
}
.card-arrow {
  font-size: 14px;
  color: rgba(255,255,255,0.28);
  flex-shrink: 0;
  margin-left: 8px;
  margin-bottom: 1px;
  transition: color 0.15s, transform 0.15s;
}
.hub-card:hover .card-arrow {
  color: rgba(255,255,255,0.65);
  transform: translateX(3px);
}

/* card-01 bigger text */
.card-01 .card-title  { font-size: 26px; }
.card-01 .card-sub    { font-size: 13px; }
.card-01 .card-icon   { font-size: 32px; top: 16px; right: 18px; }

/* WIP badge */
.card-wip {
  position: absolute;
  bottom: 14px; right: 14px;
  font-family: var(--font-mono);
  font-size: 8.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.22);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  padding: 3px 8px;
  z-index: 1;
}

/* fade-in on load */
@keyframes hub-in {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hub { animation: hub-in 0.35s cubic-bezier(0.22, 1, 0.36, 1) both; }

/* ── Mobile ── */
@media (max-width: 560px) {
  :root { --gap: 8px; --radius: 18px; }
  body { padding: max(16px, env(safe-area-inset-top)) 12px max(16px, env(safe-area-inset-bottom)) 12px; gap: 10px; }

  .hub-grid {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto;
  }

  .card-01 { grid-column: 1 / 3; grid-row: auto; min-height: 150px; }
  .card-02 { grid-column: 1 / 2; grid-row: auto; }
  .card-03 { grid-column: 2 / 3; grid-row: auto; }
  .card-04 { grid-column: 1 / 2; grid-row: auto; }
  .card-05 { grid-column: 2 / 3; grid-row: auto; }
  .card-06 { grid-column: 1 / 2; grid-row: auto; }
  .card-07 { grid-column: 2 / 3; grid-row: auto; }

  .card-01 .card-title { font-size: 22px; }
  .card-01 .card-sub   { font-size: 12px; }
  .card-01 .card-icon  { font-size: 28px; }
  .card-icon           { font-size: 22px; top: 12px; right: 12px; }
  .card-title          { font-size: 16px; }
  .card-sub            { font-size: 11px; }
}

@media (max-width: 360px) {
  .card-title { font-size: 15px; }
  .card-sub   { display: none; }
}
</style>
</head>
<body>
<div class="hub">

  <div class="hub-header">
    <span class="hub-title">Lucas' Dashboard</span>
    <span class="hub-date" id="hubDate"></span>
  </div>

  <div class="hub-grid">

    <a href="main.html" class="hub-card card-01">
      <span class="card-num">·01</span>
      <span class="card-icon">🏠</span>
      <div class="card-footer">
        <div>
          <div class="card-title">Main</div>

        </div>
        <span class="card-arrow">→</span>

      <span class="card-icon">💪</span>
      <div class="card-footer">

          <div class="card-title">Fitness</div>

    <a href="health.html" class="hub-card card-03">
      <span class="card-num">·03</span>
      <span class="card-icon">💊</span>
      <div class="card-footer">
        <div>
          <div class="card-title">Health</div>

      </div>

    <a href="po-water.html" class="hub-card card-04">
      <span class="card-num">·04</span>
      <span class="card-icon">💧</span>
      <div class="card-footer">
        <div>
          <div class="card-title">Water</div>

        </div>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <a href="finance.html" class="hub-card card-05">
      <span class="card-num">·05</span>
      <span class="card-icon">📊</span>
      <div class="card-footer">
        <div>
          <div class="card-title">Finance</div>

<script>
(function() {
  const d = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('hubDate').textContent =
    days[d.getDay()] + ' · ' + d.getDate() + ' ' + months[d.getMonth()];
})();
</script>
</body>
</html>
